<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Placeholder do QR Code Pix">
  <defs>
    <pattern id="qr" width="10" height="10" patternUnits="userSpaceOnUse">
      <rect width="10" height="10" fill="#ffffff"/>
      <rect x="0" y="0" width="5" height="5" fill="#0e1a3a"/>
      <rect x="6" y="6" width="4" height="4" fill="#0e1a3a"/>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="#ffffff" stroke="#0e1a3a" stroke-width="2"/>
  <rect x="10" y="10" width="180" height="180" fill="url(#qr)"/>
  <!-- Cantos típicos de QR -->
  <g fill="#0e1a3a">
    <rect x="14" y="14" width="40" height="40"/>
    <rect x="146" y="14" width="40" height="40"/>
    <rect x="14" y="146" width="40" height="40"/>
  </g>
  <g fill="#ffffff">
    <rect x="20" y="20" width="28" height="28"/>
    <rect x="152" y="20" width="28" height="28"/>
    <rect x="20" y="152" width="28" height="28"/>
  </g>
  <g fill="#0e1a3a">
    <rect x="26" y="26" width="16" height="16"/>
    <rect x="158" y="26" width="16" height="16"/>
    <rect x="26" y="158" width="16" height="16"/>
  </g>
  <!-- Aviso central -->
  <rect x="60" y="80" width="80" height="40" rx="6" fill="#4395fd"/>
  <text x="100" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff">QR PLACEHOLDER</text>
  <text x="100" y="113" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ffffff">Substituir por QR real</text>
</svg>
